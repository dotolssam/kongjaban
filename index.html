<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 영단어 서바이벌 챌린지</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f9f9fb; --accent: #ff7675; --correct: #27ae60; --wrong: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-box { background: white; width: 95%; max-width: 500px; padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        /* 단원 리스트 스타일 수정: 순위 버튼 포함 */
        .chapter-list { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; max-height: 350px; overflow-y: auto; padding: 5px; }
        .chapter-row { display: flex; gap: 8px; align-items: stretch; }
        .chapter-btn { flex: 4; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 0.9rem; text-align: left; padding-left: 20px; }
        .rank-view-btn { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #f8f9fa; cursor: pointer; font-size: 1.1rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .chapter-btn:hover { border-color: var(--primary); background: #f4f2ff; }
        .rank-view-btn:hover { background: #ffeaa7; border-color: #fdcb6e; }

        .hidden { display: none; }
        #question { font-size: 2.2rem; font-weight: 800; margin: 1.2rem 0; color: #2d3436; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .opt-btn:hover { background: #f0edff; border-color: var(--primary); }
        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.1rem; min-height: 50px; line-height: 1.4; }
        #timer-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 10px; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--accent); transition: linear; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        input { width: 80%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; text-align: center; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>서바이벌 영단어 ⚡</h1>
        <input type="text" id="user-name" placeholder="이름을 입력하세요">
        <p style="color: #666; font-size: 0.9rem;">단원 클릭 시 시작 / 🏆 클릭 시 순위 확인</p>
        <div class="chapter-list" id="chapter-grid"></div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <div id="info-bar" style="display:flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold;">
            <span id="timer-text" style="color: var(--accent);">남은 시간: 120초</span>
            <span id="score-text">점수: 0</span>
        </div>
        <div id="question">준비...</div>
        <div class="options" id="options-grid"></div>
        <div id="feedback"></div>
    </div>

    <div id="result-screen" class="hidden">

        <p id="final-score-text" style="font-size: 1.1rem; margin-bottom: 10px;"></p>
        <div style="background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom: 15px;">
            <h3 id="rank-chapter-title" style="margin:0 0 10px 0; font-size: 1rem; color: var(--primary);">단원 랭킹</h3>
            <table>

                <tbody id="rank-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">메인으로 돌아가기</button>

    };

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `남은 시간: ${timeLeft}초`;
            document.getElementById('timer-progress').style.width = (timeLeft / 120 * 100) + "%";
            if (timeLeft <= 0) { clearInterval(timerInterval); finishGame(); }
        }, 1000);
    }

    function renderQuiz() {
        if (timeLeft <= 0) return;
        const currentItem = currentChapterWords[Math.floor(Math.random() * currentChapterWords.length)];

        document.getElementById('score-text').innerText = `점수: ${score}`;
        startTime = Date.now();

        const grid = document.getElementById('options-grid');
        grid.innerHTML = "";

            const word = currentItem.eng;
            const hiddenIdx = Math.floor(Math.random() * word.length);
            let displayWord = "";
            for(let i=0; i<word.length; i++) displayWord += (i === hiddenIdx) ? "_ " : word[i];
            document.getElementById('question').innerHTML = `<small style='font-size:1rem; color:#888;'>철자 맞추기</small>${displayWord}<br><small style='font-size:1.2rem;'>(${currentItem.kor})</small>`;
            const answer = word[hiddenIdx].toLowerCase();
            let choices = [answer];
            while(choices.length < 4) {
                let r = String.fromCharCode(97 + Math.floor(Math.random() * 26));
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const b = document.createElement('button'); b.className="opt-btn"; b.innerText=c;
                b.onclick = () => checkAnswer(c, answer);
                grid.appendChild(b);
            });
        } else {
            const isE2K = (type === 1);
            document.getElementById('question').innerHTML = `<small style='font-size:1rem; color:#888;'>${isE2K ? '뜻' : '단어'} 고르기</small>${isE2K ? currentItem.eng : currentItem.kor}`;
            const ans = isE2K ? currentItem.kor : currentItem.eng;
            let choices = [ans];
            while(choices.length < 4) {
                let r = allWords[Math.floor(Math.random()*allWords.length)];
                let v = isE2K ? r.kor : r.eng;
                if(!choices.includes(v)) choices.push(v);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const b = document.createElement('button'); b.className="opt-btn"; b.innerText=c;
                b.onclick = () => checkAnswer(c, ans);
                grid.appendChild(b);
            });
        }
    }

    function checkAnswer(c, a) {
        if (timeLeft <= 0) return;
        if(c.toLowerCase() === a.toLowerCase()) {
            const p = 10 + Math.max(0, Math.floor(10 - (Date.now()-startTime)/1000));
            score += p;
            document.getElementById('feedback').innerHTML = `<span style='color:var(--correct)'>정답! (+${p})</span>`;
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:var(--wrong)'>오답! 정답: ${a}</span>`;
        }
        setTimeout(renderQuiz, 600);
    }

    async function finishGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score-text').innerText = `${userName}님, 최종 ${score}점!`;
        try {
            await addDoc(collection(db, "rankings"), { name: userName, score: score, chapter: selectedCh, time: new Date() });
            await loadRanking(selectedCh);
        } catch (e) { console.error(e); }
    }

    // --- ⭐ 순위 데이터 불러오기 공통 함수 ---
    async function loadRanking(chNum) {
        document.getElementById('rank-chapter-title').innerText = `${chNum}단원 실시간 TOP 10`;
        const q = query(collection(db, "rankings"), where("chapter", "==", chNum), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        const body = document.getElementById('rank-body');
        body.innerHTML = ""; let r = 1;
        snap.forEach(d => { body.innerHTML += `<tr><td>${r++}</td><td>${d.data().name}</td><td>${d.data().score}</td></tr>`; });
        if(r === 1) body.innerHTML = "<tr><td colspan='3'>아직 기록이 없습니다.</td></tr>";
    }

    // 메인 화면 버튼 생성
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('chapter-grid');
        for(let i=1; i<=20; i++) {
            const row = document.createElement('div');
            row.className = 'chapter-row';
            
            // 단원 시작 버튼
            const bStart = document.createElement('button');
            bStart.className = 'chapter-btn';
            bStart.innerHTML = `${i}단원 <span style="font-size:0.7rem; color:#999;">(${(i-1)*10+1}~${i*10})</span>`;
            bStart.onclick = () => window.selectChapter(i);
            
            // 순위 보기 버튼 (트로피 아이콘)
            const bRank = document.createElement('button');
            bRank.className = 'rank-view-btn';
            bRank.innerHTML = '🏆';
            bRank.title = "순위 보기";
            bRank.onclick = () => window.viewRankingOnly(i);
            
            row.appendChild(bStart);
            row.appendChild(bRank);
            grid.appendChild(row);
        }
    });
</script>
</body>
</html>
