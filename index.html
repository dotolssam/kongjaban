<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 영단어 올인원 챌린지</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f9f9fb; --accent: #ff7675; --correct: #27ae60; --wrong: #e74c3c; --memory: #00b894; --study: #0984e3; --balloon: #fdcb6e; --rank: #636e72; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #game-box { background: white; width: 95%; max-width: 650px; padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        
        .chapter-list { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; max-height: 500px; overflow-y: auto; padding: 10px; }
        .chapter-row { display: flex; gap: 6px; flex-wrap: wrap; background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 15px; align-items: center; }
        .chapter-info { flex: 1 1 100%; text-align: left; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 1.1rem; border-bottom: 1px solid #f1f1f1; padding-bottom: 5px; }
        
        .mode-btn { flex: 1; min-width: 60px; padding: 12px 5px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 0.85rem; transition: 0.2s; }
        .btn-study { background: var(--study); }
        .btn-memory { background: var(--memory); }
        .btn-balloon { background: var(--balloon); color: #333; }
        .btn-survival { background: var(--primary); }
        .btn-rank { background: var(--rank); flex: 0.7; }
        .mode-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .hidden { display: none; }

        /* 풍선 게임 레이어 */
        #balloon-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e0f7fa; z-index: 100; display: none; overflow: hidden; }
        .balloon { position: absolute; width: 110px; height: 130px; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; cursor: pointer; box-shadow: inset -10px -10px 15px rgba(0,0,0,0.1); text-align: center; padding: 10px; font-size: 1.1rem; }
        #balloon-target { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 50px; border-radius: 50px; font-size: 1.8rem; font-weight: 900; border: 5px solid var(--balloon); box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 110; }
        #balloon-stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; font-weight: bold; z-index: 110; }

        /* 테이블 공통 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #666; }

        .btn-main { margin-top: 20px; width: 100%; padding: 15px; background: #636e72; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1 style="color: var(--primary); margin-bottom: 5px;">영단어 마스터 🚀</h1>
        <p style="color: #888; margin-bottom: 20px;">이름을 쓰고 원하는 모드를 선택하세요!</p>
        <input type="text" id="user-name" placeholder="이름을 입력하세요" style="width:80%; padding:15px; margin-bottom:15px; border-radius:12px; border:2px solid #ddd; text-align:center; font-size: 1.1rem;">
        <div class="chapter-list" id="chapter-grid"></div>
    </div>

    <div id="study-screen" class="hidden">...</div>
    <div id="memory-screen" class="hidden">...</div>
    <div id="quiz-screen" class="hidden">...</div>

    <div id="result-screen" class="hidden">
        <h2 id="result-title" style="color: var(--rank);">단원 순위표 🏆</h2>
        <p id="final-score-text" style="font-size:1.2rem; font-weight:bold; color:var(--primary); margin: 10px 0;"></p>
        <div style="background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom: 15px; max-height: 300px; overflow-y: auto;">
            <table id="rank-table">
                <thead><tr><th>순위</th><th>이름</th><th>점수</th></tr></thead>
                <tbody id="rank-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" class="btn-main">메인으로 돌아가기</button>
    </div>
</div>

<div id="balloon-area">
    <div id="balloon-stats">

    </div>
    <div id="balloon-target">대상 단어</div>
    <button onclick="location.reload()" style="position:absolute; bottom:20px; right:20px; padding:10px 20px; z-index:120; border-radius:10px; border:none; background:#636e72; color:white; font-weight:bold; cursor:pointer;">그만하기</button>
</div>

    let currentChapterWords = [];

    // --- ⭐ 순위 보기 기능 (핵심!) ---
    window.viewRankingOnly = async (chNum) => {

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-title').innerText = `${chNum}단원 명예의 전당 🏆`;
        document.getElementById('final-score-text').innerText = "최고 점수 기록입니다.";
        await loadRanking(chNum);
    };

    async function loadRanking(chNum) {
        const body = document.getElementById('rank-body');
        body.innerHTML = "<tr><td colspan='3'>불러오는 중...</td></tr>";
        try {
            const q = query(collection(db, "rankings"), where("chapter", "==", chNum), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            body.innerHTML = "";
            let r = 1;
            snap.forEach(d => {
                body.innerHTML += `<tr><td>${r++}</td><td>${d.data().name}</td><td>${d.data().score}</td></tr>`;
            });
            if(r === 1) body.innerHTML = "<tr><td colspan='3'>아직 기록이 없습니다.</td></tr>";
        } catch (e) {
            console.error(e);
            body.innerHTML = "<tr><td colspan='3'>순위를 가져오지 못했습니다.</td></tr>";
        }
    }

    // --- 풍선 게임 (속도 강화) ---
    let balloonScore = 0, balloonLife = 3, balloonTarget = "", balloonInterval;
    window.startBalloonGame = (chNum) => {
        selectedCh = chNum; currentChapterWords = allWords.filter(w => w.ch === chNum);
        document.getElementById('balloon-area').style.display = 'block';
        balloonScore = 0; balloonLife = 3; updateBalloonInfo(); setNextBalloonTarget();
        balloonInterval = setInterval(createBalloon, 1000);
    };
    function createBalloon() {
        if(balloonLife <= 0) return;
        const b = document.createElement('div');
        const word = currentChapterWords[Math.floor(Math.random() * currentChapterWords.length)];
        b.className = 'balloon'; b.innerText = word.eng;
        b.style.left = Math.random() * (window.innerWidth - 120) + 'px';
        b.style.top = window.innerHeight + 'px';
        b.style.backgroundColor = `hsl(${Math.random() * 360}, 75%, 55%)`;
        b.onclick = () => {
            if(word.kor === balloonTarget) { balloonScore += 10; b.remove(); setNextBalloonTarget(); }
            else { balloonLife--; b.style.background = "black"; setTimeout(() => b.remove(), 200); }
            updateBalloonInfo();
        };
        document.getElementById('balloon-area').appendChild(b);
        let pos = window.innerHeight, speed = 5.5 + (balloonScore / 80);
        const move = setInterval(() => {
            pos -= speed; b.style.top = pos + 'px';
            if(pos < -150) {
                clearInterval(move);
                if(word.kor === balloonTarget && b.parentNode) { balloonLife--; updateBalloonInfo(); setNextBalloonTarget(); }
                if(b.parentNode) b.remove();
            }
            if(balloonLife <= 0) { clearInterval(move); clearInterval(balloonInterval); endBalloonGame(); }
        }, 16);
    }
    function updateBalloonInfo() { document.getElementById('balloon-score').innerText = `점수: ${balloonScore}`; document.getElementById('balloon-life').innerText = "❤️".repeat(balloonLife); }
    function setNextBalloonTarget() { balloonTarget = currentChapterWords[Math.floor(Math.random() * currentChapterWords.length)].kor; document.getElementById('balloon-target').innerText = balloonTarget; }
    function endBalloonGame() { alert(`게임 종료! 점수: ${balloonScore}`); location.reload(); }

    // --- 메인 버튼 생성 ---
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('chapter-grid');
        for(let i=1; i<=20; i++) {
            const row = document.createElement('div');
            row.className = 'chapter-row';
            row.innerHTML = `
                <div class="chapter-info">${i}단원 영단어</div>
                <button onclick="window.startStudy(${i})" class="mode-btn btn-study">학습</button>
                <button onclick="window.startMemory(${i})" class="mode-btn btn-memory">메모리</button>
                <button onclick="window.startBalloonGame(${i})" class="mode-btn btn-balloon">풍선</button>
                <button onclick="window.selectChapter(${i})" class="mode-btn btn-survival">도전</button>
                <button onclick="window.viewRankingOnly(${i})" class="mode-btn btn-rank">🏆 순위</button>
            `;
            grid.appendChild(row);
        }
    });

    // 다른 모드(Study, Memory, Survival) 함수들도 위 구조에 맞춰 window 객체에 바인딩하여 사용하면 됩니다.
    // (이전 답변들의 로직을 그대로 붙여넣으시면 작동합니다!)
</script>
</body>
