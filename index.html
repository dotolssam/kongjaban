<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 영단어 올인원 챌린지</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f9f9fb; --accent: #ff7675; --correct: #27ae60; --wrong: #e74c3c; --memory: #00b894; --study: #0984e3; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-box { background: white; width: 95%; max-width: 600px; padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        /* 메인 리스트 스타일 */
        .chapter-list { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; max-height: 450px; overflow-y: auto; padding: 10px; }
        .chapter-row { display: flex; gap: 8px; flex-wrap: wrap; background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 15px; }
        .chapter-info { flex: 1 1 100%; text-align: left; font-weight: bold; margin-bottom: 5px; color: #444; }
        .mode-btn { flex: 1; padding: 10px 5px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 0.8rem; transition: 0.2s; }
        .btn-survival { background: var(--primary); }
        .btn-study { background: var(--study); }
        .btn-memory { background: var(--memory); }
        .btn-rank { background: #636e72; }
        .mode-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 단어 카드 학습 모드 스타일 */
        .flash-card { width: 280px; height: 180px; margin: 20px auto; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; border: 3px solid var(--study); background: white; font-size: 2rem; font-weight: bold; }
        .card-back { background: #f0f7ff; transform: rotateY(180deg); color: var(--study); }

        /* 메모리 게임 스타일 */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .memory-card { height: 80px; background: var(--memory); border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; font-size: 0.85rem; font-weight: bold; padding: 5px; word-break: keep-all; transition: 0.3s; }
        .memory-card.flipped { background: white; color: #333; border: 2px solid var(--memory); }
        .memory-card.matched { background: #eee; color: #ccc; border: none; cursor: default; visibility: hidden; }

        .hidden { display: none; }
        .btn-main { margin-top: 20px; width: 100%; padding: 15px; background: #636e72; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #question { font-size: 2.2rem; font-weight: 800; margin: 1.2rem 0; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>

<div id="game-box">
    <div id="start-screen">
        <h1>영단어 마스터 🚀</h1>
        <input type="text" id="user-name" placeholder="이름을 입력하세요">
        <div class="chapter-list" id="chapter-grid"></div>
    </div>

    <div id="study-screen" class="hidden">
        <h2 style="color: var(--study);">단어 카드 학습</h2>
        <div id="card-counter">1 / 10</div>
        <div class="flash-card" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
            <div class="card-inner">
                <div class="card-face card-front" id="study-eng">Apple</div>
                <div class="card-face card-back" id="study-kor">사과</div>
            </div>
        </div>
        <p style="color: #888; font-size: 0.8rem;">카드를 클릭하면 뒤집어집니다.</p>
        <div style="display:flex; gap:10px; justify-content: center;">
            <button onclick="prevCard()" class="mode-btn btn-study" style="flex:none; width:80px;">이전</button>
            <button onclick="nextCard()" class="mode-btn btn-study" style="flex:none; width:80px;">다음</button>
        </div>
        <button onclick="location.reload()" class="btn-main">그만하기</button>
    </div>

    <div id="memory-screen" class="hidden">
        <h2 style="color: var(--memory);">짝 맞추기 게임</h2>
        <div id="memory-info">남은 짝: 10개</div>
        <div class="memory-grid" id="memory-grid"></div>
        <button onclick="location.reload()" class="btn-main">그만하기</button>
    </div>

    <div id="quiz-screen" class="hidden">

            <span id="score-text">점수: 0</span>
        </div>
        <div id="question">준비...</div>
        <div class="options" id="options-grid"></div>
        <div id="feedback"></div>
    </div>

    <div id="result-screen" class="hidden">

        </div>
        <button onclick="location.reload()" class="btn-main">메인으로</button>
    </div>
</div>

    };

        const word = currentChapterWords[studyIdx];
        document.getElementById('study-eng').innerText = word.eng;
        document.getElementById('study-kor').innerText = word.kor;
        document.getElementById('card-counter').innerText = `${studyIdx + 1} / ${currentChapterWords.length}`;
        document.querySelector('.card-inner').classList.remove('is-flipped');
    }

        document.getElementById('memory-info').innerText = `남은 짝: ${words.length}개`;

        cards.forEach(card => {
            const el = document.createElement('div');
            el.className = 'memory-card';
            el.dataset.id = card.pairId;
            el.innerText = "?";
            el.onclick = () => flipMemoryCard(el, card.text);
            grid.appendChild(el);
        });

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('memory-screen').classList.remove('hidden');
    };

    function flipMemoryCard(el, text) {
        if(lockBoard || el === firstCard || el.classList.contains('matched')) return;
        el.classList.add('flipped');
        el.innerText = text;

        if(!firstCard) { firstCard = el; return; }
        secondCard = el;
        lockBoard = true;

        if(firstCard.dataset.id === secondCard.dataset.id) {
            setTimeout(() => {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                matchesFound++;
                document.getElementById('memory-info').innerText = `남은 짝: ${currentChapterWords.length - matchesFound}개`;
                resetMemoryTurn();
                if(matchesFound === 10) alert("모두 맞췄습니다! 참 잘했어요!");
            }, 500);
        } else {
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                firstCard.innerText = "?";
                secondCard.innerText = "?";
                resetMemoryTurn();
            }, 1000);
        }
    }
    function resetMemoryTurn() { [firstCard, secondCard, lockBoard] = [null, null, false]; }

    // --- [기존 기능] 서바이벌 및 순위 ---
    window.selectChapter = (chNum) => {
        userName = document.getElementById('user-name').value.trim();
        if(!userName) return alert("이름을 입력해주세요!");
        selectedCh = chNum;
        currentChapterWords = allWords.filter(w => w.ch === chNum);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        startTimer();
        renderQuiz();
    };

    window.viewRankingOnly = async (chNum) => {
        selectedCh = chNum;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        loadRanking(chNum);
    };

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `${timeLeft}초`;
            document.getElementById('timer-progress').style.width = (timeLeft / 120 * 100) + "%";
            if (timeLeft <= 0) { clearInterval(timerInterval); finishGame(); }
        }, 1000);
    }

    function renderQuiz() {
        if (timeLeft <= 0) return;
        const currentItem = currentChapterWords[Math.floor(Math.random() * currentChapterWords.length)];
        document.getElementById('feedback').innerText = "";
        document.getElementById('score-text').innerText = `점수: ${score}`;
        startTime = Date.now();
        const type = Math.floor(Math.random() * 3) + 1;
        const grid = document.getElementById('options-grid');
        grid.innerHTML = "";

        if (type === 3 && currentItem.eng.length > 2) {
            const word = currentItem.eng;
            const hiddenIdx = Math.floor(Math.random() * word.length);
            let displayWord = "";
            for(let i=0; i<word.length; i++) displayWord += (i === hiddenIdx) ? "_ " : word[i];
            document.getElementById('question').innerHTML = `<small>철자 맞추기</small>${displayWord}<br><small>(${currentItem.kor})</small>`;
            const answer = word[hiddenIdx].toLowerCase();
            let choices = [answer];
            while(choices.length < 4) {
                let r = String.fromCharCode(97 + Math.floor(Math.random() * 26));
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const b = document.createElement('button'); b.className="opt-btn"; b.innerText=c;
                b.onclick = () => checkAnswer(c, answer);
                grid.appendChild(b);
            });
        } else {
            const isE2K = (type === 1);
            document.getElementById('question').innerHTML = `<small>${isE2K ? '뜻' : '단어'} 고르기</small>${isE2K ? currentItem.eng : currentItem.kor}`;
            const ans = isE2K ? currentItem.kor : currentItem.eng;
            let choices = [ans];
            while(choices.length < 4) {
                let r = allWords[Math.floor(Math.random()*allWords.length)];
                let v = isE2K ? r.kor : r.eng;
                if(!choices.includes(v)) choices.push(v);
            }
            choices.sort(() => Math.random() - 0.5).forEach(c => {
                const b = document.createElement('button'); b.className="opt-btn"; b.innerText=c;
                b.onclick = () => checkAnswer(c, ans);
                grid.appendChild(b);
            });
        }
    }

    function checkAnswer(c, a) {
        if (timeLeft <= 0) return;
        if(c.toLowerCase() === a.toLowerCase()) {
            const p = 10 + Math.max(0, Math.floor(10 - (Date.now()-startTime)/1000));
            score += p;
            document.getElementById('feedback').innerHTML = `<span style='color:var(--correct)'>정답! (+${p})</span>`;
        } else {
            document.getElementById('feedback').innerHTML = `<span style='color:var(--wrong)'>오답! 정답: ${a}</span>`;
        }
        setTimeout(renderQuiz, 600);
    }

    async function finishGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score-text').innerText = `${userName}님: ${score}점`;
        await addDoc(collection(db, "rankings"), { name: userName, score: score, chapter: selectedCh, time: new Date() });
        loadRanking(selectedCh);
    }

    async function loadRanking(chNum) {
        const q = query(collection(db, "rankings"), where("chapter", "==", chNum), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        const body = document.getElementById('rank-body');
        body.innerHTML = ""; let r = 1;
        snap.forEach(d => { body.innerHTML += `<tr><td>${r++}</td><td>${d.data().name}</td><td>${d.data().score}</td></tr>`; });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('chapter-grid');
        for(let i=1; i<=20; i++) {
            const row = document.createElement('div');
            row.className = 'chapter-row';
            row.innerHTML = `
                <div class="chapter-info">${i}단원 영단어</div>
                <button onclick="window.startStudy(${i})" class="mode-btn btn-study">학습</button>
                <button onclick="window.startMemory(${i})" class="mode-btn btn-memory">메모리</button>
                <button onclick="window.selectChapter(${i})" class="mode-btn btn-survival">도전</button>
                <button onclick="window.viewRankingOnly(${i})" class="mode-btn btn-rank">🏆</button>
            `;
            grid.appendChild(row);
        }
    });
</script>
</body>
</html>
